name: Publish (PyPI)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Manual publish target"
        required: true
        default: "pypi"
        type: choice
        options: [pypi]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  PYTHONUNBUFFERED: "1"
  PYTHONIOENCODING: "utf-8"
  PYTHONUTF8: "1"
  TZ: "UTC"

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build sdist & wheel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Create venv
        run: uv venv --python 3.14

      - name: Install release tools
        run: uv pip install "build>=1.2,<2.0" "twine>=5.0,<7.0"

      - name: Verify tag matches project.version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          uv run python - <<'PY'
          import os
          import pathlib
          import sys
          import tomllib

          tag = os.environ["GITHUB_REF_NAME"]
          wanted = tag[1:] if tag.startswith("v") else tag
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          found = data["project"]["version"]

          if found != wanted:
              print(f"Tag {tag!r} does not match pyproject version {found!r}.", file=sys.stderr)
              sys.exit(1)

          print(f"Version OK: {found}")
          PY

      - name: Build
        run: uv run python -m build

      - name: Twine check
        run: uv run python -m twine check dist/*

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI (OIDC)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
          verbose: true
