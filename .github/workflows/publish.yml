name: Publish (PyPI)

on:
  workflow_dispatch:

concurrency:
  group: publish-manual-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  PYTHONUNBUFFERED: "1"
  PYTHONIOENCODING: "utf-8"
  PYTHONUTF8: "1"
  TZ: "UTC"

defaults:
  run:
    shell: bash

jobs:
  publish-pypi:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Create venv
        run: uv venv --python 3.14

      - name: Install build tool
        run: uv pip install "build>=1.2,<2.0"

      - name: Build package
        run: uv run python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
          verbose: true
