name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: ["opened", "synchronize", "reopened"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  PYTHONUNBUFFERED: "1"
  PYTHONIOENCODING: "utf-8"
  PYTHONUTF8: "1"
  TZ: "UTC"
  CI: "1"
  ORION_TOKEN: "TEST_TOKEN"
  STATLINE_ENV: "test"
  STATLINE_MODE: "local"
  STATLINE_DEBUG: "0"
  STATLINE_LOADER_STRICT: "1"
  SKIP_LIVE_SHEETS: "1"
  SLAPI_URL: "http://127.0.0.1:8000"

defaults:
  run:
    shell: bash

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Create venv
        run: uv venv --python 3.14

      - name: Install ruff
        run: uv pip install "ruff>=0.5,<1.0"

      - name: Ruff format check
        run: uv run --no-sync ruff format --check .

      - name: Ruff lint
        run: uv run --no-sync ruff check . --output-format=github
 
  mypy:
    name: Mypy
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Create venv
        run: uv venv --python 3.14

      - name: Install devpack
        run: uv pip install -e ".[devpack]"

      - name: Type check
        run: uv run python -m mypy .

  tests:
    name: Tests (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true

      - name: Create venv
        run: uv venv --python ${{ matrix.python }}

      - name: Install dev/test dependencies
        run: uv pip install -e ".[devpack]"

      - name: Prepare test results dir
        run: mkdir -p test-results

      - name: Run tests
        shell: bash
        run: |
          if ! find tests -name 'test_*.py' -print -quit 2>/dev/null | grep -q .; then
            echo "No tests detected."
            echo '<?xml version="1.0" ?><testsuite></testsuite>' > test-results/junit.xml
            echo '<?xml version="1.0" ?><coverage></coverage>' > coverage.xml
            exit 0
          fi

          uv run pytest -ra \
            --maxfail=1 \
            --durations=10 \
            --cov=statline \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results/junit.xml
            
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-py${{ matrix.python }}
          path: |
            test-results/junit.xml
            coverage.xml
          if-no-files-found: warn

      - name: PR coverage summary]
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          format: markdown
          output: both

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ruff, tests]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Create venv
        run: uv venv --python 3.14

      - name: Install build backend
        run: uv pip install "build>=1.2,<2.0" "twine>=5.0,<7.0"

      - name: Build sdist & wheel
        run: uv run --no-sync python -m build

      - name: Twine check
        run: uv run --no-sync python -m twine check dist/*

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-ubuntu
          path: dist/*
  smoke:
    name: Wheel smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Create venv
        run: uv venv --python 3.14

      - name: Download built wheel
        uses: actions/download-artifact@v4
        with:
          name: dist-ubuntu
          path: dist

      - name: Install wheel
        run: |
          for i in 1 2 3; do
            uv pip install dist/*.whl && exit 0
            echo "Wheel install failed, retrying..."
            sleep 10
          done
          uv pip install dist/*.whl

      - name: Resolve venv commands
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "PY=$GITHUB_WORKSPACE/.venv/Scripts/python.exe" >> "$GITHUB_ENV"
            echo "STATLINE=$GITHUB_WORKSPACE/.venv/Scripts/statline.exe" >> "$GITHUB_ENV"
          else
            echo "PY=$GITHUB_WORKSPACE/.venv/bin/python" >> "$GITHUB_ENV"
            echo "STATLINE=$GITHUB_WORKSPACE/.venv/bin/statline" >> "$GITHUB_ENV"
          fi

      - name: Import package
        working-directory: ${{ runner.temp }}
        run: '"$PY" -c "import statline; print(\"Import OK\", statline.__version__)"'

      - name: CLI help (module entry point)
        working-directory: ${{ runner.temp }}
        run: '"$PY" -m statline.cli --mode local --help'

      - name: CLI help (console script)
        working-directory: ${{ runner.temp }}
        run: '"$STATLINE" --mode local --help'

      - name: Public API smoke
        working-directory: ${{ runner.temp }}
        run: |
          "$PY" - <<'PY'
          from statline import list_adapters, list_datasets, load_adapter, load_dataset, score_row

          adapters = list_adapters()
          assert adapters, "No adapters discovered"
          assert "demo" in adapters, f"demo adapter missing; got {adapters!r}"

          datasets = list_datasets()
          assert "DEMO/demo.csv" in datasets, f"demo dataset missing; got {datasets!r}"

          adapter = load_adapter("demo")
          row = load_dataset("demo", limit=1)[0]
          result = score_row(adapter, row)

          assert isinstance(result["pri"], int), result
          assert "scores" in result, result
          print("Smoke OK:", adapter.key, result["pri"])
          PY

      - name: Adapter registry smoke
        working-directory: ${{ runner.temp }}
        run: |
          "$PY" - <<'PY'
          from statline.core.adapters import list_names, load

          names = list_names()
          assert names, "No adapters discovered"
          for name in names:
              adapter = load(name)
              assert adapter.key
              assert adapter.score_profiles, f"{adapter.key} has no score profiles"
          print("Adapters OK:", ", ".join(names))
          PY